# mdBook config for the mneme documentation site.
#
# Built by `.github/workflows/pages.yml` on every push to main and
# deployed to https://omanishay-cyber.github.io/mneme/.

[book]
title = "Mneme"
description = "Local-only memory layer for AI coding. 50 MCP tools, 14 graph views, 22 storage layers, three real symbol resolvers. Apache-2.0."
authors = ["Anish Trivedi", "Kruti Trivedi"]
language = "en"
src = "src"

[output.html]
# v0.4.0 docs (2026-05-05): LIGHT ONLY. User explicit: "do not make
# dark theme at all". `default-theme = "light"` locks the initial
# load; `preferred-dark-theme = "light"` makes prefers-color-scheme:
# dark also resolve to light. The theme picker UI is hidden via CSS
# in theme/custom.css so users can't toggle out of light.
default-theme = "light"
preferred-dark-theme = "light"
git-repository-url = "https://github.com/omanishay-cyber/mneme"
edit-url-template = "https://github.com/omanishay-cyber/mneme/edit/main/docs-book/{path}"
additional-css = ["theme/custom.css"]
additional-js = []
no-section-label = false
mathjax-support = false
copy-fonts = true

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false
copyable = true
copy-js = true
line-numbers = false

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
copy-js = true

[output.html.print]
enable = true

[preprocessor.links]
