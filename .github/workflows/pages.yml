# GitHub Pages — Mneme docs site
#
# Builds the mdBook at docs-book/ and deploys to
# https://omanishay-cyber.github.io/mneme/.
#
# v0.4.0 audit Item #92 — replaces the prior hand-written docs/index.html
# with a multi-page versioned site (still served on the same URL via the
# Pages "GitHub Actions" source).

name: pages

on:
  push:
    branches: [main]
    paths:
      - "docs-book/**"
      - ".github/workflows/pages.yml"
      # Re-deploy when canonical content sources change so the docs
      # stay in lockstep with repo state.
      - "README.md"
      - "CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install mdBook
        run: |
          MDBOOK_VERSION="0.4.40"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Build mdBook
        working-directory: docs-book
        run: |
          mdbook --version
          mdbook build
          ls -la book/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
