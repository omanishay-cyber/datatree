name: Weekly Benchmarks

on:
  schedule:
    # Every Monday 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bench:
    name: Bench (mneme self, ubuntu-latest)
    runs-on: ubuntu-latest
    # Anish 2026-05-07: a Bug #30 follow-up. The `bench-all` step on the
    # full mneme self-corpus with BGE-on does 6 sequential rebuilds
    # (token-reduction, viz-scale, incremental, compare, recall, first-
    # build) and ran 99 minutes on a 2-core ubuntu CI runner before we
    # cancelled by hand. With no `timeout-minutes` set, GitHub's default
    # is the 6-hour job ceiling — way too long to silently burn CI
    # minutes on a Monday cron that's supposed to be a regression gate.
    # 60 minutes is a deliberate ceiling: if a future run can't land in
    # an hour, it auto-cancels and surfaces the design problem instead
    # of consuming hours of compute. The followup is to subset the
    # bench corpus or move to a 4-core runner; until then this guards
    # against runaway cost.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build bench binary
        run: cargo build --release -p benchmarks --bin bench_retrieval

      # BENCH-FIX-2 follow-up (2026-05-07): install the BGE embedding model
      # into the runner's `~/.mneme/models/` so the bench harness's semantic
      # recall fallback can actually run. Without these files Embedder
      # is_ready() returns false (hashing-trick fallback only),
      # recall_semantic_fallback returns empty, and every multi-word
      # natural-language query in the golden set permanently misses.
      # The 2026-05-07 04:18 baseline run showed 7 of 10 queries returning
      # `-` for exactly this reason — ONNX + tokenizer were never present.
      #
      # Cache the models between runs because the ONNX is ~133 MB and
      # there's no point re-downloading from HuggingFace every Monday.
      - name: Cache BGE embedding model
        id: cache-bge
        uses: actions/cache@v4
        with:
          path: ~/.mneme/models
          key: bge-small-en-v1.5-${{ runner.os }}

      - name: Install BGE embedding model
        if: steps.cache-bge.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.mneme/models
          # URL mirrors what release/install-linux.sh already uses.
          curl -fsSL --retry 3 \
            "https://huggingface.co/aaditya4u/mneme-models/resolve/main/bge-small-en-v1.5.onnx" \
            -o ~/.mneme/models/bge-small-en-v1.5.onnx
          curl -fsSL --retry 3 \
            "https://huggingface.co/aaditya4u/mneme-models/resolve/main/tokenizer.json" \
            -o ~/.mneme/models/tokenizer.json
          ls -la ~/.mneme/models/

      - name: Run bench-all against Mneme itself
        run: just bench-all . > bench-run.csv 2> bench-run.log

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-run-${{ github.run_id }}
          path: |
            bench-run.csv
            bench-run.log

      - name: Append trend row to bench-history.csv
        run: |
          set -euo pipefail
          HEADER="run_id,sha,date,mneme_tokens_sum,cold_tokens_sum,mneme_ms_sum,cold_ms_sum,precision_at_5_pct,precision_at_10_pct,cold_ms_first_build,warm_ms_first_build,incremental_p50_ms,incremental_p95_ms,bytes_per_node,bytes_per_edge"
          if [ ! -f bench-history.csv ]; then
            echo "$HEADER" > bench-history.csv
          fi
          # bench-all writes one multi-line JSON summary on stderr. Extract it.
          python3 - <<'PY'
          import json, pathlib, re, sys
          raw = pathlib.Path("bench-run.log").read_text(encoding="utf-8", errors="replace")
          start = raw.rfind("{")
          end = raw.rfind("}")
          if start == -1 or end == -1 or end <= start:
              pathlib.Path("bench-run.json").write_text("{}")
              sys.exit(0)
          blob = raw[start:end+1]
          try:
              obj = json.loads(blob)
          except Exception:
              obj = {}
          pathlib.Path("bench-run.json").write_text(json.dumps(obj))
          PY
          RUN_ID=${{ github.run_id }}
          SHA=$(git rev-parse HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          MT=$(jq -r '.compare_totals.mneme_total_tokens // 0' bench-run.json)
          CT=$(jq -r '.compare_totals.cold_total_tokens // 0' bench-run.json)
          MMS=$(jq -r '.compare_totals.mneme_total_ms // 0' bench-run.json)
          CMS=$(jq -r '.compare_totals.cold_total_ms // 0' bench-run.json)
          P5=$(jq -r '.compare_totals.mneme_precision_pct // 0' bench-run.json)
          P10=$(jq -r '.recall.precision_at_10_pct // 0' bench-run.json)
          CMF=$(jq -r '.first_build.cold_ms // 0' bench-run.json)
          WMF=$(jq -r '.first_build.warm_ms // 0' bench-run.json)
          IP50=$(jq -r '.incremental.p50_ms // 0' bench-run.json)
          IP95=$(jq -r '.incremental.p95_ms // 0' bench-run.json)
          BPN=$(jq -r '.viz_scale.bytes_per_node // 0' bench-run.json)
          BPE=$(jq -r '.viz_scale.bytes_per_edge // 0' bench-run.json)
          echo "${RUN_ID},${SHA},${DATE},${MT},${CT},${MMS},${CMS},${P5},${P10},${CMF},${WMF},${IP50},${IP95},${BPN},${BPE}" >> bench-history.csv

      - name: Commit bench-history.csv
        run: |
          set -euo pipefail
          git config user.name "bench-bot"
          git config user.email "bench-bot@users.noreply.github.com"
          git add bench-history.csv
          if ! git diff --cached --quiet; then
            git commit -m "chore(bench): weekly trend row"
            git push
          else
            echo "no new trend row"
          fi
