name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # v0.1 intentionally tolerates warnings (parsers crate has unused-feature
  # cfgs from Tier-2 grammars commented out pending stable pins). v0.2 flips
  # this back to `-D warnings`.
  RUSTFLAGS: ""

jobs:
  rust:
    name: Rust (build + test + clippy)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true  # v0.1: enforce loosely until baseline is clean

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true  # v0.1: 27 existing parser warnings

      - name: Build
        run: cargo build --workspace --verbose
        continue-on-error: true  # v0.1: parsers has unused-feature cfg warnings

      - name: Test
        run: cargo test --workspace --verbose
        continue-on-error: true  # v0.1: tests not yet wired; enforce in v0.2

      - name: Check multimodal extractors (default features)
        run: cargo check -p mneme-multimodal
        continue-on-error: true

      - name: Check multimodal extractors (all optional features)
        # Needs tesseract/whisper/ffmpeg system libs; tolerated to fail.
        run: cargo check -p mneme-multimodal --features all-extractors
        continue-on-error: true

  mcp:
    name: MCP server (bun check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install MCP deps
        working-directory: mcp
        run: bun install

      - name: Type check
        working-directory: mcp
        run: bunx tsc --noEmit
        continue-on-error: true  # v0.1: zod strict-input/output warnings

  vision:
    name: Vision app (bun check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install vision deps
        working-directory: vision
        run: bun install

      - name: Type check
        working-directory: vision
        run: bunx tsc --noEmit
        continue-on-error: true

  # v0.2: the Python multimodal sidecar has been retired. Extraction is
  # now pure Rust in `multimodal-bridge/` (see cli::commands::graphify).
  # Left here as a breadcrumb for anyone grepping for the old job.

  license-check:
    name: License header present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: LICENSE file exists
        run: test -f LICENSE && grep -qi "apache license" LICENSE

  audit:
    name: Cargo audit (RUSTSEC advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        # v0.1 tolerates findings, v0.2 flips to fail-fast. Listing them is
        # already 80 percent of the value; we want to see them in CI logs
        # without breaking the green light until we have a triage process.
        run: cargo audit --json
        continue-on-error: true

  deny:
    name: Cargo deny (license + bans + duplicates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check
          arguments: --all-features
        continue-on-error: true  # v0.1 tolerated, v0.2 enforced

  doctor-paths:
    name: Doctor cross-platform path tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run doctor_paths integration test
        run: cargo test --release -p mneme-cli --test doctor_paths
        continue-on-error: true  # v0.1 tolerated until we wire fixtures everywhere

  e2e-big-repo:
    name: E2E build + recall + blast on a real repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build mneme release binary
        run: cargo build --release -p mneme-cli --bin mneme
      - name: Build supervisor
        run: cargo build --release -p mneme-daemon
      - name: Build all workers
        run: cargo build --release --workspace --bins
      - name: Run e2e (clones a fixture repo, builds, recalls, blasts)
        env:
          MNEME_BIN: ${{ github.workspace }}/target/release/mneme
        run: cargo test --release -p mneme-cli --test e2e_big_repo -- --ignored --nocapture
        continue-on-error: true  # v0.1 tolerated; v0.2 makes this gating
