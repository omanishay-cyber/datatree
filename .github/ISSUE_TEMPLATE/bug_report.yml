name: 🐛 Bug report
description: Something datatree is doing wrong
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. A reproducible bug is a gift.

  - type: input
    id: version
    attributes:
      label: datatree version
      description: Output of `datatree --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS 14+
        - macOS 13
        - Ubuntu 22.04+
        - Ubuntu 20.04
        - Fedora
        - Arch
        - Other Linux
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust version
      description: Output of `rustc --version`
      placeholder: "rustc 1.95.0 (59807616e 2026-04-14)"

  - type: input
    id: bun-version
    attributes:
      label: Bun version
      description: Output of `bun --version`
      placeholder: "1.3.13"

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Tell us what datatree did and what you expected it to do instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands. Copy-pasteable, please.
      placeholder: |
        1. `datatree install --platform claude-code`
        2. `datatree build .`
        3. Open Claude Code, run `/dt-status`
        4. See error
      render: bash
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        - `datatree --verbose doctor` output
        - `~/.mneme/supervisor.log` (last 50 lines)
        - Any relevant stderr
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: AV software, antivirus, unusual filesystem (FAT32, exFAT), VPN, corporate proxy, etc.
