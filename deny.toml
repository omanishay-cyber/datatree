# cargo-deny config for mneme.
# Run via: cargo deny check
# CI runs this on every push + PR (continue-on-error in v0.1).
#
# Three checks: licenses, banned crates, advisories.
# Loosest-acceptable defaults today; tighten in v0.2 once we have a baseline.

[graph]
# Build for the platforms we ship to (Windows + Unix). Skip wasm/embedded.
targets = [
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
]

[advisories]
# Run via the GitHub-hosted RUSTSEC advisory database. Refresh on every CI run.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
# v0.1 records but does not enforce. v0.2 flips `vulnerability` and
# `unmaintained` to "deny". Today we want visibility without blocking CI.
yanked = "warn"
unmaintained = "warn"
notice = "warn"
ignore = []

[licenses]
# Apache-2.0-compatible licenses we accept upstream.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "OpenSSL",
]
# Known-banned (copyleft) — flag immediately.
deny = ["AGPL-3.0", "GPL-2.0", "GPL-3.0", "LGPL-2.1", "LGPL-3.0"]
# Be lenient on confidence — many crates have ambiguous license text.
confidence-threshold = 0.8
exceptions = []

[bans]
# v0.1 tolerated. v0.2: enforce single-version invariant on hot crates.
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
# Where we accept dependencies from.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
