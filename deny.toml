# cargo-deny config for mneme.
# Run via: cargo deny check
# CI runs this on every push + PR (continue-on-error in v0.1).
#
# Three checks: licenses, banned crates, advisories.
# Loosest-acceptable defaults today; tighten in v0.2 once we have a baseline.

[graph]
# Build for the platforms we ship to (Windows + Unix). Skip wasm/embedded.
targets = [
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
]

[advisories]
# Run via the GitHub-hosted RUSTSEC advisory database. Refresh on every CI run.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
# v0.1 records but does not enforce. v0.2 flips things to "deny". Today we
# want visibility without blocking CI.
# cargo-deny 0.15+ accepts "all" | "workspace" | "transitive" | "none" on
# `unmaintained` (old "warn" is gone). "all" is the most permissive + logs.
yanked = "warn"
unmaintained = "all"
ignore = [
    # paste — upstream author archived the repo; alternatives (pastey,
    # with_builtin_macros) exist but switching requires a tokenizers fork.
    # No CVE, just unmaintained.
    "RUSTSEC-2024-0436",
    # number_prefix — used transitively by indicatif for progress bar units.
    # Upstream alternative: unit-prefix. Waiting on indicatif upstream fix.
    "RUSTSEC-2025-0119",
    # lru::IterMut stacked-borrow unsoundness. We do not use IterMut anywhere
    # in mneme; only LruCache::{get, put, peek}. Safe in practice; flagged
    # for visibility. Will upgrade lru when 0.13.x lands.
    "RUSTSEC-2026-0002",
    # bincode v1.3.3 — upstream says v2 is the new line; v1 is unmaintained.
    # We use it for the embedding-cache serde. Migrate to bincode v2 in v0.4.
    "RUSTSEC-2025-0141",
]

[licenses]
# Apache-2.0-compatible licenses we accept upstream.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "OpenSSL",
]
# cargo-deny 0.15+ removed `deny = [...]` — use allow-only model. Anything
# not in `allow` above is rejected by default. To flag copyleft explicitly,
# rely on the absence from `allow`.
# Be lenient on confidence — many crates have ambiguous license text.
confidence-threshold = 0.8
exceptions = []

[bans]
# v0.1 tolerated. v0.2: enforce single-version invariant on hot crates.
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
# Where we accept dependencies from.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
