<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f19"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.2" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#4191E1" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#4191E1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.85" cy="0.75" r="0.55">
      <stop offset="0" stop-color="#41E1B5" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#41E1B5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4191E1"/>
      <stop offset="0.5" stop-color="#41E1B5"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glowA)"/>
  <rect width="1280" height="640" fill="url(#glowB)"/>

  <!-- faint node graph hint in the background -->
  <g stroke="#4191E1" stroke-opacity="0.10" stroke-width="1.2" fill="none">
    <path d="M 120 540 Q 240 380, 360 480 T 600 420 T 860 380 T 1140 460"/>
    <path d="M 80 380 Q 220 300, 380 340 T 640 280 T 920 260 T 1200 280"/>
    <path d="M 240 200 Q 420 250, 600 180 T 900 220 T 1180 190"/>
  </g>
  <g fill="#41E1B5" fill-opacity="0.22">
    <circle cx="120" cy="540" r="3"/>
    <circle cx="360" cy="480" r="3"/>
    <circle cx="600" cy="420" r="3"/>
    <circle cx="860" cy="380" r="3"/>
    <circle cx="1140" cy="460" r="3"/>
    <circle cx="380" cy="340" r="3"/>
    <circle cx="640" cy="280" r="3"/>
    <circle cx="920" cy="260" r="3"/>
    <circle cx="600" cy="180" r="3"/>
    <circle cx="900" cy="220" r="3"/>
  </g>

  <!-- tree emoji hero -->
  <g filter="url(#softShadow)">
    <text x="90" y="210" font-size="160" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,sans-serif">🌳</text>
  </g>

  <!-- wordmark -->
  <text x="270" y="200"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
        font-weight="800"
        font-size="150"
        letter-spacing="-4"
        fill="url(#titleGrad)"
        filter="url(#softShadow)">datatree</text>

  <!-- tagline -->
  <text x="92" y="300"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
        font-weight="600"
        font-size="42"
        fill="#e6edf3">Claude never starts cold. Claude never loses its place.</text>

  <!-- subtag -->
  <text x="92" y="352"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
        font-weight="400"
        font-size="24"
        fill="#94a3b8">Persistent per-project AI superbrain · 33+ MCP tools · 14 views · 100% local</text>

  <!-- feature chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="600">
    <g transform="translate(92, 420)">
      <rect width="220" height="54" rx="12" fill="#4191E1" fill-opacity="0.12" stroke="#4191E1" stroke-opacity="0.45"/>
      <text x="110" y="34" text-anchor="middle" fill="#4191E1">Survives compaction</text>
    </g>
    <g transform="translate(332, 420)">
      <rect width="200" height="54" rx="12" fill="#41E1B5" fill-opacity="0.12" stroke="#41E1B5" stroke-opacity="0.45"/>
      <text x="100" y="34" text-anchor="middle" fill="#41E1B5">18 AI tools</text>
    </g>
    <g transform="translate(552, 420)">
      <rect width="240" height="54" rx="12" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-opacity="0.45"/>
      <text x="120" y="34" text-anchor="middle" fill="#22D3EE">25× token reduction</text>
    </g>
    <g transform="translate(812, 420)">
      <rect width="200" height="54" rx="12" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.45"/>
      <text x="100" y="34" text-anchor="middle" fill="#a78bfa">Zero cloud</text>
    </g>
  </g>

  <!-- install command -->
  <g transform="translate(92, 520)">
    <rect width="900" height="68" rx="12" fill="#0b0f19" stroke="#334155"/>
    <text x="28" y="43"
          font-family="JetBrains Mono, SF Mono, ui-monospace, Menlo, monospace"
          font-size="22" fill="#cbd5e1">
      <tspan fill="#64748b">$ </tspan>/plugin marketplace add github:omanishay-cyber/datatree
    </text>
  </g>

  <!-- bottom-right repo label -->
  <text x="1188" y="615" text-anchor="end"
        font-family="JetBrains Mono, SF Mono, ui-monospace, monospace"
        font-size="18"
        fill="#64748b">github.com/omanishay-cyber/datatree</text>
</svg>
